<div class="relative min-h-screen flex flex-col bg-background text-foreground">

  <!-- Scenic Background (Image 2 Style) -->
  @if (useScenicBg()) {
    <div class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat"
         style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2670');">
      <div class="absolute inset-0 bg-black/30 backdrop-blur-[2px]"></div>
    </div>
  }

  <!-- Header -->
  <header class="relative z-10 flex items-center justify-between p-4 px-6 h-16">
    <div class="flex items-center gap-4">
      <!-- Removed icons as requested for pure dark mode focus -->
    </div>
  </header>

  <!-- Main Content -->
  <main class="relative z-10 flex-1 flex flex-col items-center pt-[12vh] sm:pt-[18vh] pb-12 px-4">
    
    <!-- Logo -->
    <div class="mb-4 sm:mb-8 select-none w-full px-4 text-center">
      <h1 class="text-[38px] leading-tight sm:text-7xl md:text-[90px] font-bold tracking-tight sm:tracking-tighter sm:leading-none border-none block w-full">
        No Name Defined
      </h1>
    </div>

    <!-- Search Bar Wrapper -->
    <div class="w-full max-w-[600px] relative z-20">
      <!-- Actual Search Container -->
      <div class="flex items-center w-full h-[52px] pl-5 pr-4 gap-3 bg-muted/50 border border-border rounded-full backdrop-blur-xl group focus-within:bg-[#303134] focus-within:shadow-2xl focus-within:border-border/50 transition-all duration-200">
        <ng-icon hlmIcon name="lucideSearch" class="size-5 text-muted-foreground shrink-0"></ng-icon>
        
        <input hlmInput
               [ngModel]="searchQuery()"
               (ngModelChange)="searchQuery.set($event)"
               (keyup.enter)="onSearch()"
               placeholder="Search news, categories or agents"
               class="flex-1 bg-transparent border-none ring-0 focus-visible:ring-0 px-2 text-[16px] text-foreground placeholder:text-muted-foreground/60 overflow-hidden h-full" />
      </div>
    </div>

    <!-- Infrastructure Warning Alert (Spartan UI Component) placed below search bar -->
    <div hlmAlert class="max-w-[600px] w-full mt-6 bg-surface-100 border border-border rounded-xl p-4 flex items-start gap-3">
      <ng-icon hlmIcon name="lucideAlertTriangle" class="size-5 text-amber-500 shrink-0 mt-0.5"></ng-icon>
      <div class="flex-1">
        <h4 hlmAlertTitle class="text-[13px] font-bold text-foreground">Infrastructure Notice</h4>
        <p hlmAlertDescription class="text-[11px] text-muted-foreground mt-0.5 leading-normal">
          An upcoming migration of the entire project infrastructure will take place soon. Expect performance improvements and architecture enhancements.
        </p>
      </div>
    </div>

    <!-- News & SuperAgent Navigation Buttons -->
    <div class="mt-6 flex flex-wrap justify-center gap-2 sm:gap-3">
      <button hlmBtn variant="ghost" (click)="goToNews()" 
              class="text-[11px] sm:text-[13px] font-medium text-muted-foreground hover:text-foreground h-7 sm:h-8 px-4 sm:px-6 rounded-full bg-muted/10 hover:bg-muted/30 border border-border/20">
        Not defined yet
      </button>
      <button hlmBtn variant="ghost" (click)="goToSuperAgent()" 
              class="text-[11px] sm:text-[13px] font-medium text-muted-foreground hover:text-foreground h-7 sm:h-8 px-4 sm:px-6 rounded-full bg-muted/10 hover:bg-muted/30 border border-border/20">
        Not defined yet (Panel)
      </button>
    </div>

  </main>

  <!-- Global Footer -->
  @if (!useScenicBg()) {
    <app-footer class="mt-auto w-full" />
  }

  <!-- Floating Settings -->
  @if (useScenicBg()) {
    <button hlmBtn variant="ghost" size="icon" 
            class="absolute bottom-6 right-6 z-20 rounded-full text-white/40 hover:text-white">
      <ng-icon hlmIcon name="lucideSlidersHorizontal" class="size-5"></ng-icon>
    </button>
  }

</div>
