<router-outlet />

<!-- Notifications Overlay Container -->
<div class="fixed top-4 left-4 right-4 md:top-auto md:bottom-6 md:right-6 md:left-auto z-[9999] flex flex-col gap-3 w-auto md:w-full md:max-w-[380px] pointer-events-none">
  @for (notif of notificationService.notifications(); track notif.id) {
    <div hlmAlert class="pointer-events-auto relative flex items-start gap-4 p-4 rounded-xl border bg-white/95 border-black/10 shadow-2xl backdrop-blur-md animate-in fade-in slide-in-from-top-2 md:slide-in-from-bottom-2 duration-300">
      <!-- Icon based on type -->
      @switch (notif.type) {
        @case ('success') {
          <ng-icon name="lucideCheckCircle" class="size-5 text-emerald-600 shrink-0 mt-0.5" />
        }
        @case ('warning') {
          <ng-icon name="lucideAlertTriangle" class="size-5 text-amber-600 shrink-0 mt-0.5" />
        }
        @case ('error') {
          <ng-icon name="lucideXCircle" class="size-5 text-rose-600 shrink-0 mt-0.5" />
        }
        @default {
          <ng-icon name="lucideInfo" class="size-5 text-blue-600 shrink-0 mt-0.5" />
        }
      }

      <div hlmAlertDescription class="flex-1 text-[13px] font-medium text-slate-800 leading-tight pr-6 m-0 border-none">
        {{ notif.message }}
      </div>

      <button hlmAlertAction (click)="notificationService.dismiss(notif.id)" class="text-slate-400 hover:text-slate-700 transition-colors cursor-pointer shrink-0 absolute right-3 top-3 bg-transparent border-none p-1 rounded-md hover:bg-slate-100">
        <ng-icon name="lucideX" class="size-4" />
      </button>
    </div>
  }
</div>
